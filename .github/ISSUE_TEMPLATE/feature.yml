name: "✨ New Feature"
description: 기능 추가 및 구현 작업용 이슈 템플릿입니다.
body:
  - type: textarea
    id: goal
    attributes:
      label: 기능 설명
      placeholder: 어떤 내용을 구현했는지 간단히 설명해주세요.
    validations:
      required: true

  - type: input
    id: module
    attributes:
      label: 어떤 패키지와 클래스에서 어떤 작업을 했는지 작성해주세요.
      placeholder: "module/feature"
    validations:
      required: true     

  - type: textarea
    id: checklist
    attributes:
      label: 구현 체크리스트
      value: |
        - [ ] 다른 팀원의 기능 코드에 불필요한 변경을 하지 않았습니다.
        - [ ] 팀에서 정한 패키지 구조와 파일 위치를 지켰습니다.
        - [ ] 변수명, 메서드명, URL 등 코드 컨벤션을 확인했습니다.
        - [ ] 실행 후 화면 또는 기능이 정상 동작하는지 확인했습니다.
        - [ ] Slack 이슈보고방에 보고하였습니다. 
    validations:
      required: true

  - type: input
    id: module
    attributes:
      label: 리뷰어가 확인해야 할 내용이나 공유할 사항이 있다면 작성해주세요.
      placeholder: "자유롭게 적어주세요!!"
    validations:
      required: true   

---
# name: Feature
# about: 기능 추가 및 구현 작업용 이슈 템플릿입니다.
# title: "[Feat] "
# labels: ''
# assignees: ''

# ---

# ## 🛠️기능 설명
# 어떤 내용을 구현했는지 간단히 설명해주세요.

# 예시: 강사가 과제를 등록하고, 학생이 과제를 제출할 수 있는 기능을 구현했습니다.

# ---

## 🪠작업 내용
# 어떤 패키지와 클래스에서 어떤 작업을 했는지 작성해주세요.

# 예시(경로는 간단하게):
# - `course/controller/CourseController` : 코스 등록 요청 처리
# - `course/service/CourseService` : 코스 등록 비즈니스 로직 구현
# - `course/repository/CourseRepository` : 코스 저장 및 조회 처리
# - `templates/instructor/course/regist.html` : 코스 등록 화면 작성

# ---

# ## ✅ 체크리스트
# - [ ] 다른 팀원의 기능 코드에 불필요한 변경을 하지 않았습니다.
# - [ ] 팀에서 정한 패키지 구조와 파일 위치를 지켰습니다.
# - [ ] 변수명, 메서드명, URL 등 코드 컨벤션을 확인했습니다.
# - [ ] 실행 후 화면 또는 기능이 정상 동작하는지 확인했습니다.
# - [ ] Slack 이슈보고방에 보고하였습니다. 
# ---

# ## 참고 사항
# 리뷰어가 확인해야 할 내용이나 공유할 사항이 있다면 작성해주세요.
