name: "🐞 Bug report"
description: 버그 발생 시 해결 과정 및 방법 공유용 템플릿입니다.
labels: "[BUG] "

body:
  - type: input
    id: location
    attributes:
      label: 문제 지점
      placeholder: module/login
    validations:
      required: true
      
  - type: textarea
    id: description
    attributes:
      label: 🐞버그 설명
      placeholder: "예시: 학생 계정으로 과제 제출 버튼을 눌렀을 때, 내용이 비어 있어도 제출이 완료됩니다."
    validations:
      required: true

  - type: textarea
    id: result
    attributes:
      label: 버그 수정 결과
      placeholder: 버그 수정 결과를 작성해주세요.
    validations:
      required: true

- type: textarea
    id: checklist
    attributes:
      label: 수정 체크리스트
      value: |
        - [ ] 버그 발생 화면 또는 파일 위치를 작성했습니다.
        - [ ] 재현 방법을 순서대로 작성했습니다.
        - [ ] 다른 팀원의 기능과 관련된 문제인지 확인했습니다.
        - [ ] Slack 이슈보고방에 보고했습니다.
    validations:          
      required: true      
                          
  - type: input           
    id: note
    attributes:
      label: 리뷰어가 확인해야 할 내용이나 공유할 사항이 있다면 작성해주세요.
      placeholder: "자유롭게 적어주세요!!"

# ---
# name: Bug report
# about: 버그 발생 시 해결 과정 및 방법 공유용 템플릿입니다.
# title: "[BUG] "
# labels: ''
# assignees: ''

# ---

# ## 🐞버그 설명
# 어떤 문제가 발생했는지 간단히 설명해주세요.

# 예시: 학생 계정으로 과제 제출 버튼을 눌렀을 때, 내용이 비어 있어도 제출이 완료됩니다.

# ---

# ## 🚨발생 위치
# 버그가 발생한 화면, URL, 패키지 또는 클래스를 작성해주세요.

# 예시(경로는 간단하게):
# - 화면: 과제 제출 화면
# - URL: `/submission/regist`
# - 관련 파일: `submission/controller/SubmissionController`
# - 관련 파일: `submission/service/SubmissionService`

# ---

# ## 결과
# 버그 수정 결과를 작성해주세요.

# ---

# ## 체크리스트
# - [ ] 버그 발생 화면 또는 파일 위치를 작성했습니다.
# - [ ] 재현 방법을 순서대로 작성했습니다.
# - [ ] 다른 팀원의 기능과 관련된 문제인지 확인했습니다.
# - [ ] Slack 이슈보고방에 보고했습니다.

# ---

# ## 참고 사항
# 에러 메시지, 콘솔 로그, 스크린샷 등 추가로 공유할 내용이 있다면 작성해주세요.
