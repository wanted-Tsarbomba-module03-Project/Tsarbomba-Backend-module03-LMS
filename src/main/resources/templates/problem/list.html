<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>codebomba - 문제 목록</title>
    <style>
        :root {
            --primary: #1f2588;
            --text: #1f2937;
            --muted: #6b7280;
            --line: #e5e7eb;
            --soft: #f3f4f6;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-width: 1024px;
            color: var(--text);
            font-family: Arial, "Noto Sans KR", sans-serif;
            background: #ffffff;
        }

        .topbar {
            height: 70px;
            display: grid;
            grid-template-columns: 360px 1fr 430px;
            align-items: center;
            border-bottom: 1px solid var(--line);
            padding: 0 56px 0 68px;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            color: var(--primary);
            font-weight: 800;
            font-size: 28px;
        }

        .brand-mark {
            width: 28px;
            height: 28px;
            border: 4px solid var(--primary);
            border-radius: 50%;
            position: relative;
        }

        .brand-mark::after {
            content: "";
            width: 8px;
            height: 8px;
            border: 2px solid var(--primary);
            border-left: 0;
            border-bottom: 0;
            border-radius: 50%;
            position: absolute;
            top: -8px;
            right: -5px;
        }

        .search {
            width: min(864px, 100%);
            justify-self: center;
            position: relative;
        }

        .search input {
            width: 100%;
            height: 52px;
            padding: 0 56px 0 26px;
            border: 1px solid #d9dde5;
            border-radius: 9px;
            color: var(--text);
            font-size: 19px;
            outline: none;
        }

        .search span {
            position: absolute;
            right: 23px;
            top: 50%;
            width: 20px;
            height: 20px;
            border: 3px solid #64748b;
            border-radius: 50%;
            transform: translateY(-50%);
        }

        .search span::after {
            content: "";
            position: absolute;
            width: 10px;
            height: 3px;
            right: -9px;
            bottom: -5px;
            background: #64748b;
            transform: rotate(45deg);
            border-radius: 999px;
        }

        .nav {
            justify-self: end;
            display: flex;
            align-items: center;
            gap: 34px;
            font-size: 18px;
            font-weight: 700;
        }

        .profile {
            height: 52px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0 18px;
            border: 2px solid var(--primary);
            border-radius: 999px;
            color: var(--primary);
        }

        .profile .brand-mark {
            width: 24px;
            height: 24px;
            border-width: 3px;
        }

        .layout {
            display: grid;
            grid-template-columns: 404px 1fr;
            min-height: calc(100vh - 70px);
        }

        .sidebar {
            border-right: 1px solid var(--line);
            padding: 62px 27px;
        }

        .sidebar h1 {
            margin: 0 0 34px;
            font-size: 34px;
            line-height: 1;
        }

        .category {
            width: 100%;
            height: 62px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-radius: 7px;
            color: var(--text);
            font-weight: 800;
            font-size: 22px;
            margin-bottom: 14px;
            text-decoration: none;
        }

        .category.active {
            background: var(--primary);
            color: #ffffff;
        }

        .content {
            padding: 27px 50px 26px;
        }

        .board {
            min-height: calc(100vh - 124px);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 35px 32px;
        }

        .board-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 34px;
        }

        .board h2 {
            margin: 0;
            font-size: 36px;
        }

        .sort {
            height: 52px;
            min-width: 180px;
            padding: 0 22px;
            border: 1px solid #d9dde5;
            border-radius: 8px;
            background: #ffffff;
            color: var(--text);
            font-weight: 800;
            font-size: 16px;
        }

        .table-wrap {
            overflow: hidden;
            border: 1px solid #d9dde5;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            font-size: 20px;
        }

        thead th {
            height: 64px;
            background: var(--soft);
            text-align: left;
            font-weight: 900;
        }

        th,
        td {
            padding: 0 22px;
            border-bottom: 1px solid var(--line);
            white-space: nowrap;
        }

        tbody td {
            height: 63px;
        }

        tbody tr:last-child td {
            border-bottom: 0;
        }

        .col-no {
            width: 102px;
        }

        .col-submit {
            width: 330px;
        }

        .col-rate {
            width: 205px;
        }

        .problem-link {
            color: var(--text);
            text-decoration: none;
        }

        .problem-link:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        .empty-message {
            text-align: center;
            color: var(--muted);
        }
    </style>
</head>
<body>
<header class="topbar">
    <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>codebomba</span>
    </div>
    <label class="search" aria-label="강의 검색">
        <input type="search" placeholder="강의 검색...">
        <span aria-hidden="true"></span>
    </label>
    <nav class="nav" aria-label="주요 메뉴">
        <span>내 강의실</span>
        <span>문제 풀이</span>
        <span class="profile"><span class="brand-mark" aria-hidden="true"></span>닉네임</span>
    </nav>
</header>

<main class="layout">
    <aside class="sidebar">
        <h1>카테고리</h1>
        <a class="category"
           th:each="category : ${categories}"
           th:href="@{/problem(categoryId=${category.categoryId})}"
           th:text="${category.categoryName}"
           th:classappend="${category.categoryId == selectedCategoryId} ? ' active' : ''">
            데이터 분석
        </a>
    </aside>

    <section class="content">
        <div class="board">
            <div class="board-head">
                <h2>문제 목록</h2>
                <select class="sort" aria-label="문제 정렬">
                    <option>전체 정렬</option>
                    <option>최신순</option>
                </select>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th class="col-no">No.</th>
                        <th>문제명</th>
                        <th class="col-submit">제출</th>
                        <th class="col-rate">정답률</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="problemSet, stat : ${problemSets}">
                        <td th:text="${#numbers.formatInteger(stat.count, 2)}">01</td>
                        <td>
                            <a class="problem-link"
                               th:href="@{/problem/sets/{problemSetId}(problemSetId=${problemSet.problemSetId})}"
                               th:text="${problemSet.title}">
                                문제 세트명이 들어가는 자리입니다.
                            </a>
                        </td>
                        <td>-</td>
                        <td>-</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(problemSets)}">
                        <td class="empty-message" colspan="4">등록된 문제 세트가 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</main>
</body>
</html>
