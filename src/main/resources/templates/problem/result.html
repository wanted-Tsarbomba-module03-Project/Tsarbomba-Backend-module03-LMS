<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>codebomba - 문제 결과</title>
    <style>
        :root {
            --primary: #1f2588;
            --text: #1f2937;
            --muted: #6b7280;
            --line: #e5e7eb;
            --soft: #f3f4f6;
            --success: #15803d;
            --danger: #b91c1c;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-width: 1024px;
            color: var(--text);
            font-family: Arial, "Noto Sans KR", sans-serif;
            background: #ffffff;
        }

        .topbar {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 56px;
            border-bottom: 1px solid var(--line);
        }

        .brand {
            color: var(--primary);
            font-size: 26px;
            font-weight: 800;
        }

        .button {
            min-width: 120px;
            height: 44px;
            border: 0;
            border-radius: 8px;
            background: var(--primary);
            color: #ffffff;
            font-weight: 800;
            cursor: pointer;
        }

        .page {
            padding: 36px 56px;
        }

        .summary {
            display: grid;
            grid-template-columns: 1fr repeat(3, 180px);
            gap: 16px;
            align-items: stretch;
            margin-bottom: 28px;
        }

        .summary-card {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 22px;
            background: #ffffff;
        }

        .summary-card h1 {
            margin: 0 0 10px;
            font-size: 28px;
        }

        .summary-card p {
            margin: 0;
            color: var(--muted);
            line-height: 1.5;
        }

        .metric {
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        .metric strong {
            font-size: 28px;
            color: var(--primary);
        }

        .metric span {
            margin-top: 8px;
            color: var(--muted);
            font-weight: 700;
        }

        .problem-list {
            display: grid;
            gap: 18px;
        }

        .problem-card {
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow: hidden;
        }

        .problem-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 18px 22px;
            background: var(--soft);
        }

        .problem-head h2 {
            margin: 0;
            font-size: 21px;
        }

        .badge {
            min-width: 72px;
            text-align: center;
            padding: 8px 12px;
            border-radius: 999px;
            color: #ffffff;
            font-weight: 800;
        }

        .badge.correct {
            background: var(--success);
        }

        .badge.wrong {
            background: var(--danger);
        }

        .problem-body {
            display: grid;
            gap: 16px;
            padding: 22px;
            line-height: 1.7;
        }

        .label {
            margin: 0 0 6px;
            color: var(--muted);
            font-size: 14px;
            font-weight: 800;
        }

        .content-box {
            margin: 0;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
<header class="topbar">
    <div class="brand">codebomba</div>
    <button class="button" type="button" onclick="location.href='/problem'">문제 목록</button>
</header>

<main class="page">
    <section class="summary">
        <div class="summary-card">
            <h1 th:text="${result.title}">문제 세트 제목</h1>
            <p>완료한 문제 세트의 제출 답안과 해설을 다시 확인할 수 있습니다.</p>
        </div>
        <div class="summary-card metric">
            <strong th:text="${result.accuracyRate} + '%'">0.0%</strong>
            <span>정답률</span>
        </div>
        <div class="summary-card metric">
            <strong th:text="${result.correctCompletedUserCount}">0</strong>
            <span>완료 사용자</span>
        </div>
        <div class="summary-card metric">
            <strong th:text="${result.totalCompletedUserCount}">0</strong>
            <span>시작 사용자</span>
        </div>
    </section>

    <section class="problem-list">
        <article class="problem-card" th:each="submission : ${result.submissions}">
            <div class="problem-head">
                <h2 th:text="'문제 ' + ${submission.problemNumber} + '. ' + ${submission.title}">
                    문제 제목
                </h2>
                <span class="badge"
                      th:classappend="${submission.isCorrect} ? ' correct' : ' wrong'"
                      th:text="${submission.isCorrect} ? '정답' : '오답'">정답</span>
            </div>
            <div class="problem-body">
                <div>
                    <p class="label">문제 내용</p>
                    <p class="content-box" th:text="${submission.content}">문제 내용</p>
                </div>
                <div>
                    <p class="label">내 제출 답안</p>
                    <p class="content-box" th:text="${submission.submittedAnswer}">제출 답안</p>
                </div>
                <div>
                    <p class="label">해설</p>
                    <p class="content-box" th:text="${submission.explanation}">해설</p>
                </div>
                <div>
                    <p class="label">제출 시간</p>
                    <p class="content-box" th:text="${submission.submittedAt}">제출 시간</p>
                </div>
            </div>
        </article>
    </section>
</main>
</body>
</html>
