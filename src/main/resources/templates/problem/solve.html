<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>codebomba - 문제 풀이</title>
    <style>
        :root {
            --primary: #1f2588;
            --text: #1f2937;
            --muted: #6b7280;
            --line: #e5e7eb;
            --soft: #f3f4f6;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-width: 1180px;
            color: var(--text);
            font-family: Arial, "Noto Sans KR", sans-serif;
            background: #ffffff;
        }

        button {
            font: inherit;
            cursor: pointer;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .topbar {
            height: 56px;
            display: grid;
            grid-template-columns: 300px 1fr 420px;
            align-items: center;
            border-bottom: 1px solid var(--line);
            padding: 0 48px 0 56px;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            color: var(--primary);
            font-size: 22px;
            font-weight: 800;
        }

        .brand-mark {
            width: 22px;
            height: 22px;
            border: 3px solid var(--primary);
            border-radius: 50%;
            position: relative;
        }

        .brand-mark::after {
            content: "";
            width: 7px;
            height: 7px;
            border: 2px solid var(--primary);
            border-left: 0;
            border-bottom: 0;
            border-radius: 50%;
            position: absolute;
            top: -7px;
            right: -5px;
        }

        .search {
            width: min(672px, 100%);
            justify-self: center;
        }

        .search input {
            width: 100%;
            height: 40px;
            padding: 0 20px;
            border: 1px solid #d9dde5;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        .nav {
            justify-self: end;
            display: flex;
            align-items: center;
            gap: 32px;
            font-size: 16px;
        }

        .profile {
            height: 40px;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 0 14px;
            border: 1.5px solid var(--primary);
            border-radius: 999px;
            color: var(--primary);
        }

        .toolbar {
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 47px;
            background: #f4f5f7;
            border-bottom: 1px solid var(--line);
        }

        .secondary-button,
        .primary-button {
            min-width: 123px;
            height: 47px;
            border: 0;
            border-radius: 8px;
            font-weight: 800;
        }

        .secondary-button {
            background: #ffffff;
            color: var(--text);
        }

        .primary-button {
            background: var(--primary);
            color: #ffffff;
        }

        .layout {
            display: grid;
            grid-template-columns: 304px 1fr;
            min-height: calc(100vh - 124px);
        }

        .sidebar {
            border-right: 1px solid var(--line);
            padding: 50px 23px;
        }

        .sidebar h1 {
            margin: 0 0 28px;
            font-size: 25px;
        }

        .problem-state {
            width: 100%;
            height: 46px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-radius: 6px;
            margin-bottom: 9px;
            background: #ffffff;
            color: var(--text);
            font-weight: 700;
        }

        .problem-state.selected {
            background: #15165a;
            color: #ffffff;
        }

        .workspace {
            padding: 23px 28px 26px;
            display: grid;
            grid-template-columns: minmax(420px, 1fr) minmax(560px, 1.27fr);
            gap: 32px;
        }

        .card {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #ffffff;
        }

        .problem-card {
            min-height: calc(100vh - 173px);
            padding: 25px;
        }

        .problem-card h2,
        .solution-card h2 {
            margin: 0;
            font-size: 26px;
            line-height: 1.25;
        }

        .problem-meta {
            margin: 16px 0 24px;
            color: var(--muted);
            font-weight: 700;
        }

        .problem-content {
            margin: 0;
            white-space: pre-wrap;
            line-height: 1.7;
            font-size: 18px;
        }

        .answer-area {
            min-height: calc(100vh - 173px);
            display: grid;
            grid-template-rows: 488px 1fr;
            gap: 27px;
        }

        .solution-card {
            padding: 26px 22px;
        }

        .answer-input {
            width: 100%;
            height: 280px;
            margin-top: 28px;
            padding: 18px;
            border: 1px solid #d9dde5;
            border-radius: 8px;
            resize: none;
            outline: none;
            font-size: 17px;
            line-height: 1.6;
            font-family: inherit;
        }

        .hint-bar {
            width: 100%;
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 24px;
            border: 1px solid #d9dde5;
            border-radius: 8px;
            background: var(--soft);
            color: var(--text);
            font-size: 20px;
            font-weight: 800;
        }

        .result-card {
            position: relative;
            overflow: hidden;
        }

        .tabs {
            height: 48px;
            display: grid;
            grid-template-columns: 124px 176px 124px 1fr;
            background: var(--soft);
            border-bottom: 1px solid #d9dde5;
        }

        .tab {
            border: 1px solid #d9dde5;
            border-left: 0;
            border-bottom: 0;
            background: #ffffff;
            color: var(--text);
            font-weight: 800;
        }

        .result-body {
            min-height: 274px;
            padding: 22px;
            white-space: pre-wrap;
        }

        .submit-bottom {
            position: absolute;
            right: 22px;
            bottom: 23px;
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgb(0 0 0 / 48%);
            z-index: 10;
        }

        .modal-backdrop.open {
            display: flex;
        }

        .modal {
            width: 480px;
            min-height: 348px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 48px;
            border-radius: 16px;
            background: #ffffff;
            box-shadow: 0 24px 60px rgb(15 23 42 / 28%);
        }

        .info-icon {
            width: 58px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 5px solid var(--primary);
            border-radius: 50%;
            color: var(--primary);
            font-size: 36px;
            font-weight: 800;
            line-height: 1;
        }

        .modal strong {
            font-size: 25px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
        }

        .modal-actions button {
            width: 128px;
            height: 48px;
            border: 0;
            border-radius: 9px;
            font-weight: 800;
        }

        .confirm {
            background: var(--primary);
            color: #ffffff;
        }

        .cancel {
            background: #f0f1f4;
            color: var(--text);
        }
    </style>
</head>
<body>
<header class="topbar">
    <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>codebomba</span>
    </div>
    <label class="search" aria-label="강의 검색">
        <input type="search" placeholder="강의 검색...">
    </label>
    <nav class="nav" aria-label="주요 메뉴">
        <span>내 강의실</span>
        <span>문제 풀이</span>
        <span class="profile"><span class="brand-mark" aria-hidden="true"></span>닉네임</span>
    </nav>
</header>

<div class="toolbar">
    <button class="secondary-button" type="button" onclick="history.back()">뒤로가기</button>
    <button class="primary-button" type="button">실행하기</button>
</div>

<main class="layout">
    <aside class="sidebar">
        <h1 th:text="'전체 문제 ' + ${progress.solvedProblemCount} + '/' + ${progress.totalProblemCount}">
            전체 문제 0/0
        </h1>
        <div class="problem-state selected"
             th:text="'문제 ' + ${problemSet.currentProblemNumber}">문제 1</div>
    </aside>

    <section class="workspace">
        <article class="card problem-card">
            <h2 th:text="${problemSet.problem != null ? problemSet.problem.title : '문제 세트 완료'}">문제 제목</h2>
            <div class="problem-meta" th:if="${problemSet.problem != null}">
                <span th:text="'문제 유형: ' + ${problemSet.problem.problemType}">문제 유형</span>
                <span th:text="' | 문제 ID: ' + ${problemSet.problem.problemId}"> | 문제 ID</span>
            </div>
            <p class="problem-content"
               th:text="${problemSet.problem != null ? problemSet.problem.content : '모든 문제 풀이가 완료되었습니다.'}">
                문제 내용이 들어갑니다.
            </p>
        </article>

        <section class="answer-area">
            <article class="card solution-card">
                <h2>문제풀이영역</h2>
                <textarea class="answer-input"
                          id="submittedAnswer"
                          placeholder="답안을 입력하세요."
                          th:disabled="${problemSet.isCompleted}"></textarea>
                <button class="hint-bar" type="button" id="hintButton">힌트를 확인할 수 있습니다.</button>
            </article>

            <article class="card result-card">
                <div class="tabs" role="tablist" aria-label="문제 풀이 보조 영역">
                    <button class="tab" type="button">실행결과</button>
                    <button class="tab" type="button" id="hintTabButton">힌트</button>
                    <button class="tab" type="button" id="solutionButton" disabled>풀이보기</button>
                    <span></span>
                </div>
                <div class="result-body"
                     id="resultBody"
                     th:text="${problemSet.isCompleted ? '모든 문제를 다 풀었습니다.' : ''}"></div>
                <button class="primary-button submit-bottom"
                        type="button"
                        id="openSubmitModal"
                        th:text="${problemSet.isCompleted ? '완료' : '제출하기'}">제출하기</button>
            </article>
        </section>
    </section>
</main>

<div class="modal-backdrop" id="submitModal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="submitTitle">
        <div class="info-icon" aria-hidden="true">i</div>
        <strong id="submitTitle">제출하시겠습니까?</strong>
        <div class="modal-actions">
            <button class="confirm" type="button" id="confirmSubmit">확인</button>
            <button class="cancel" type="button" id="closeSubmitModal">취소</button>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const problemSetId = /*[[${problemSet.problemSetId}]]*/ 1;
    const problemId = /*[[${problemSet.problem != null ? problemSet.problem.problemId : null}]]*/ null;
    const isCompleted = /*[[${problemSet.isCompleted}]]*/ false;
    const userId = 1;

    const modal = document.getElementById("submitModal");
    const openButton = document.getElementById("openSubmitModal");
    const closeButton = document.getElementById("closeSubmitModal");
    const confirmButton = document.getElementById("confirmSubmit");
    const answerInput = document.getElementById("submittedAnswer");
    const resultBody = document.getElementById("resultBody");
    const solutionButton = document.getElementById("solutionButton");
    const hintButton = document.getElementById("hintButton");
    const hintTabButton = document.getElementById("hintTabButton");
    let nextProblemUrl = null;
    let solutionExplanation = "";

    async function showHint() {
        if (!problemId) {
            resultBody.textContent = "현재 조회할 힌트가 없습니다.";
            return;
        }

        try {
            const response = await fetch(`/api/v1/problems/${problemId}/hints`);
            const hints = await response.json();

            if (!response.ok) {
                resultBody.textContent = "힌트를 불러오지 못했습니다.";
                return;
            }

            if (hints.length === 0) {
                resultBody.textContent = "등록된 힌트가 없습니다.";
                return;
            }

            resultBody.textContent = hints
                .map(hint => `${hint.hintOrder}. ${hint.hintContent}`)
                .join("\n\n");
        } catch (error) {
            resultBody.textContent = "힌트를 불러오지 못했습니다.";
        }
    }

    function openModal() {
        modal.classList.add("open");
        modal.setAttribute("aria-hidden", "false");
    }

    function closeModal() {
        modal.classList.remove("open");
        modal.setAttribute("aria-hidden", "true");
    }

    openButton.addEventListener("click", () => {
        if (nextProblemUrl) {
            window.location.href = nextProblemUrl;
            return;
        }

        if (isCompleted) {
            window.location.href = "/problem";
            return;
        }

        if (!problemId) {
            return;
        }

        openModal();
    });

    closeButton.addEventListener("click", closeModal);
    hintButton.addEventListener("click", showHint);
    hintTabButton.addEventListener("click", showHint);

    solutionButton.addEventListener("click", () => {
        if (solutionButton.disabled) {
            return;
        }

        resultBody.textContent = solutionExplanation || "등록된 풀이가 없습니다.";
    });

    async function submitAnswer() {
        const submittedAnswer = answerInput.value;

        if (submittedAnswer === "") {
            resultBody.textContent = "답안을 입력해주세요.";
            closeModal();
            return;
        }

        try {
            const response = await fetch(`/api/v1/problems/${problemId}/submissions`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    userId: userId,
                    submittedAnswer: submittedAnswer
                })
            });

            const result = await response.json();

            if (!response.ok) {
                resultBody.textContent = "제출 중 오류가 발생했습니다.";
                closeModal();
                return;
            }

            const isCorrect = result.correct ?? result.isCorrect;
            const attemptNo = result.attemptNo ?? "-";
            const remainingAttemptCount = result.remainingAttemptCount ?? 0;
            const canRetry = result.canRetry ?? false;
            const nextProblemId = result.nextProblemId;
            const isProblemSetCompleted = result.problemSetCompleted ?? result.isProblemSetCompleted ?? false;
            const explanation = result.explanation ?? "";

            resultBody.textContent =
                (isCorrect ? "정답입니다." : "오답입니다.") +
                `\n시도 횟수: ${attemptNo}` +
                `\n남은 제출 횟수: ${remainingAttemptCount}` +
                `\n재시도 가능 여부: ${canRetry ? "가능" : "불가능"}` +
                (nextProblemId ? `\n다음 문제 ID: ${nextProblemId}` : "") +
                `\n문제 세트 완료 여부: ${isProblemSetCompleted ? "완료" : "진행 중"}`;

            if (isCorrect) {
                solutionExplanation = explanation;
                solutionButton.disabled = false;

                if (nextProblemId && !isProblemSetCompleted) {
                    nextProblemUrl = `/problem/sets/${problemSetId}?userId=${userId}`;
                    openButton.textContent = "다음 문제";
                } else {
                    openButton.textContent = "완료";
                    nextProblemUrl = "/problem";
                }
            }
        } catch (error) {
            resultBody.textContent = "서버와 통신할 수 없습니다.";
        }

        closeModal();
    }

    confirmButton.addEventListener("click", submitAnswer);

    modal.addEventListener("click", (event) => {
        if (event.target === modal) {
            closeModal();
        }
    });

    window.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
            closeModal();
        }
    });
</script>
</body>
</html>
